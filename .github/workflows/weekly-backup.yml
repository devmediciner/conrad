name: Weekly Supabase Backup

on:
  schedule:
    # Roda a cada domingo à meia-noite (UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Permite rodar o workflow manualmente pelo painel do GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão necessária para fazer push de volta pro repositório
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # ou a versão do node que você usa

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Database Backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node backup-db.js

      - name: Generate Sitemap
        run: npm run sitemap

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add backup_supabase_db/
          git add public/sitemap.xml
          
          # Verifica se há alterações para commitar
          if git diff --staged --quiet; then
            echo "Nenhuma mudança nova nos backups ou no sitemap."
          else
            git commit -m "chore: backup automático e atualização do sitemap"
            git push
            echo "✅ Backup e Sitemap atualizados e comitados com sucesso!"
          fi
